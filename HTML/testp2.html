<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        button{
            width: 100px;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: rgba(0, 128, 28, 0.712);
        }
    </style>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <div>
        <label for="name">
            Name:
            <input type="text" 
            maxlength="10"
            minlength="5"
            placeholder="Enter your name">
        </label>
        </div>
        <div>
        <label for="email">
            Email:
            <input type="text"
            placeholder="Enter your email">
        </label>
        </div>
        <div>
        <label for="password">
            Password:
            <input type="password"
            placeholder="Enter your password">
        </label>
        </div>
        <div>
        <label for="gender">
            Gender:
            <select name="gender" id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </label>
        </div>
        <div>
        <label for="subjects">
            Subjects:
            <input type="checkbox" name="subjects" value="math">Math
            <input type="checkbox" name="subjects" value="science">Science
            <input type="checkbox" name="subjects" value="history">History
        </label>
        </div>
        <div >
        <label for="message">
            Message:
            <textarea name="message" id="message" cols="20" rows="10" placeholder="Enter your message"></textarea>
        </label>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>

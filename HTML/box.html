<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
    background-color: rgba(0, 204, 255, 0.651);
    width: 200px;
    height: 200px;
    margin: 10px;
    padding: 10px;
    border: 2px solid blue;
    box-sizing: border-box;
display: inline-block;
        }
        .img-with-text{
            background-color: rgba(165, 42, 42, 0.384);
            padding: 10px 5px;
        }
        .img-with-text button{
            background-color: rgb(0, 119, 255);
            padding: 10px 20px;
            margin: 8px;
            cursor: pointer;
        }
        .img-box img{
           width: 300px;
        }
        .img-box{
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Box Model</h1>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <!-- image with text -->
     <section>
        <div class="img-with-text">
         <h1>Image with Text</h1>
         <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Inventore, ducimus aperiam maiores necessitatibus ipsum sequi ipsam aut accusamus odit est, commodi quam cupiditate corrupti laborum voluptatibus. Non totam repellendus consequuntur.</p>
         <button>Get More Info</button>
        </div>
    </section>
    <section>
        <div class="img-box">
            <img src="flower.webp" alt="flower">
        </div>
     </section>
</body>
</html>
